services:
  # ── App (Vite Dev Server) ──────────────────────
  # Uses the project .env — so Firebase config points to the real project.
  # No emulators anymore.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lasaedu-app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      # Empty VITE_FILE_SERVER_URL → client uses relative paths that Vite proxies.
      - VITE_FILE_SERVER_URL=
      # Internal URL used by the Vite proxy to reach the file server.
      - VITE_FILE_SERVER_INTERNAL=http://fileserver:3010

  # ── File Server ────────────────────────────────
  fileserver:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lasaedu-fileserver
    ports:
      - "3010:3010"
    volumes:
      - ./server/uploads:/uploads
      # Mount server code so changes don't require a rebuild (dev only).
      - ./server/index.js:/app/index.js:ro
    environment:
      - PORT=3010
      - UPLOAD_DIR=/uploads
      # BASE_URL left empty so the server returns relative URLs — Vite proxies them.
      - BASE_URL=
      - FIREBASE_PROJECT_ID=demo-project
      - ALLOWED_ORIGINS=http://localhost:5173
    restart: unless-stopped
