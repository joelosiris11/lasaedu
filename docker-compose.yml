services:
  # ── App (Vite Dev Server) ──────────────────────
  # Uses the project .env — so Firebase config points to the real project.
  # No emulators anymore.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lasaedu-app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_FILE_SERVER_URL=http://localhost:3010

  # ── File Server ────────────────────────────────
  fileserver:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lasaedu-fileserver
    ports:
      - "3010:3010"
    volumes:
      - ./server/uploads:/uploads
    environment:
      - PORT=3010
      - UPLOAD_DIR=/uploads
      - BASE_URL=http://localhost:3010
      - FIREBASE_PROJECT_ID=demo-project
      - ALLOWED_ORIGINS=http://localhost:5173
    restart: unless-stopped
